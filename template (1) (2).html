<html>
  <head>
    <title>Позинги роблокса от Ильи</title>
    <style>
      body {
        text-align: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        color: #e94560;
        min-height: 100vh;
      }
      h1 {
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        font-size: 2.5em;
      }
      header {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 30px;
        padding: 40px 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border-bottom: 3px solid #e94560;
      }
      header img {
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        transition: transform 0.3s ease;
      }
      header img:hover {
        transform: scale(1.05);
      }
      .content-section {
        margin: 50px auto;
        max-width: 800px;
        padding: 30px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        backdrop-filter: blur(5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .content-section iframe {
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
        border: 2px solid #e94560;
      }
      .content-section p {
        font-size: 24px;
        color: #fff;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .gallery {
        margin: 50px auto;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        padding: 0 20px;
      }
      .gallery img {
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        transition: all 0.3s ease;
        border: 3px solid transparent;
      }
      .gallery img:hover {
        transform: translateY(-10px);
        border-color: #e94560;
        box-shadow: 0 10px 25px rgba(233, 69, 96, 0.4);
      }
      footer {
        margin-top: 60px;
        padding: 40px 20px;
        background: rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        border-top: 2px solid #e94560;
      }
      footer h1 {
        font-size: 1.8em;
        margin-bottom: 10px;
      }
      .btn-container {
        display: flex;
        gap: 20px;
        justify-content: center;
      }
      .custom-btn {
        text-decoration: none;
        color: #fff;
        background: #e94560;
        padding: 12px 30px;
        border-radius: 50px;
        font-weight: bold;
        font-size: 18px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        text-transform: uppercase;
      }
      .custom-btn:hover {
        background: #ff6b81;
        transform: scale(1.1);
        box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
      }
    </style>
  </head>
  <body>
    <header> 
      <img src="https://allwebs.ru/images/2026/07/01/161e7631b0d9193e232df580234f0c3c.png" height="200">
      <h1>Позинги роблокса от Ильи</h1>
    </header>
    
    <div class="content-section"> 
      <iframe src="https://www.youtube.com/embed/5tjwFiA_PzE?si=xAaKcNYWWViSJNpV" height="360" width="640"></iframe>
      <p>мой гайд по созданию позингов</p>
    </div>
    
    <div class="gallery"> 
      <img src="https://allwebs.ru/images/2026/07/05/2de4be9be979fd483b0d429db3d7a2dd.png" height="200">
      <img src="https://allwebs.ru/images/2026/07/05/502bf5afb320ba6476f7b3fb0897fec4.png" height="200">
      <img src="https://allwebs.ru/images/2026/07/05/2fec2e12b760df56246ba51c04da904b.png" height="200">
    </div>
    
    <footer>
      <h1>связаться со мной</h1>
      <div class="btn-container">
        <a href="https://max.ru/u/f9LHodD0cOKReXgtRKArEy74EprJWz0NYgEol--uJY4lJETANg3UiF09mCA" class="custom-btn">MAX</a>
        <a href="https://www.youtube.com/@ilyasud888" class="custom-btn">Youtube</a>
      </div>
    </footer>
  </body>
</html>
